<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 多叉决策树的边（根 → 3 枝 → 6 叶，分支逐层收窄的排列树） -->
  <g stroke="#333333" stroke-width="30" stroke-linecap="round" fill="none">
    <line x1="512" y1="150" x2="220" y2="470" />
    <line x1="512" y1="150" x2="512" y2="470" />
    <line x1="512" y1="150" x2="804" y2="470" />
    <line x1="220" y1="470" x2="140" y2="800" />
    <line x1="220" y1="470" x2="300" y2="800" />
    <line x1="512" y1="470" x2="432" y2="800" />
    <line x1="512" y1="470" x2="592" y2="800" />
    <line x1="804" y1="470" x2="724" y2="800" />
    <line x1="804" y1="470" x2="884" y2="800" />
  </g>
  <!-- 根 + 三个内部节点（空心） -->
  <g fill="#ffffff" stroke="#333333" stroke-width="30">
    <circle cx="512" cy="150" r="74" />
    <circle cx="220" cy="470" r="56" />
    <circle cx="512" cy="470" r="56" />
    <circle cx="804" cy="470" r="56" />
  </g>
  <!-- 六个叶子：交替实心（一个排列）/空心 -->
  <g stroke="#333333" stroke-width="22">
    <circle cx="140" cy="800" r="46" fill="#333333" />
    <circle cx="300" cy="800" r="46" fill="#ffffff" />
    <circle cx="432" cy="800" r="46" fill="#333333" />
    <circle cx="592" cy="800" r="46" fill="#ffffff" />
    <circle cx="724" cy="800" r="46" fill="#333333" />
    <circle cx="884" cy="800" r="46" fill="#ffffff" />
  </g>
</svg>
