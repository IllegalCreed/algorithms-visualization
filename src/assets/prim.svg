<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 候选横切边（细虚线，正在权衡） -->
  <g fill="none" stroke="#333333" stroke-width="20" stroke-linecap="round" stroke-dasharray="34 30">
    <line x1="460" y1="720" x2="772" y2="720" />
  </g>
  <!-- 已并入树的边（粗实线，从起点生长） -->
  <g fill="none" stroke="#333333" stroke-width="56" stroke-linecap="round" stroke-linejoin="round">
    <line x1="180" y1="512" x2="460" y2="300" />
    <line x1="180" y1="512" x2="460" y2="720" />
    <line x1="460" y1="300" x2="772" y2="230" />
    <line x1="460" y1="300" x2="772" y2="470" />
  </g>
  <!-- 树内顶点 -->
  <g fill="#333333">
    <circle cx="460" cy="300" r="68" />
    <circle cx="460" cy="720" r="68" />
    <circle cx="772" cy="230" r="64" />
    <circle cx="772" cy="470" r="64" />
  </g>
  <!-- 起点（生长的根，空心环强调） -->
  <circle cx="180" cy="512" r="86" fill="#ffffff" stroke="#333333" stroke-width="40" />
</svg>
