    <rect x="220" y="580" width="100" height="120" rx="14" />
    <rect x="336" y="580" width="100" height="120" rx="14" />
    <rect x="452" y="580" width="100" height="120" rx="14" />
    <rect x="568" y="580" width="100" height="120" rx="14" />
    <rect x="684" y="580" width="100" height="120" rx="14" />
    <rect x="800" y="580" width="100" height="120" rx="14" />
