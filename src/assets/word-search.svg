<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 网格外框 -->
  <rect x="120" y="120" width="784" height="784" rx="36" fill="none" stroke="#333333" stroke-width="30" />
  <!-- 内部网格线（3×3） -->
  <g stroke="#333333" stroke-width="18" stroke-linecap="round" opacity="0.5">
    <line x1="381" y1="120" x2="381" y2="904" />
    <line x1="642" y1="120" x2="642" y2="904" />
    <line x1="120" y1="381" x2="904" y2="381" />
    <line x1="120" y1="642" x2="904" y2="642" />
  </g>
  <!-- 匹配路径（沿相邻格蜿蜒） -->
  <polyline
    points="250,250 512,250 512,512 774,512 774,774"
    fill="none"
    stroke="#333333"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- 路径上的格（起点实心 + 沿途结点） -->
  <g fill="#333333">
    <circle cx="250" cy="250" r="58" />
    <circle cx="512" cy="250" r="40" />
    <circle cx="512" cy="512" r="40" />
    <circle cx="774" cy="512" r="40" />
    <circle cx="774" cy="774" r="58" />
  </g>
</svg>
