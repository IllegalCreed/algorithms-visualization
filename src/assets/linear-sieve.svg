<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 数字网格 4×4：合数带最小质因子角标（右下小字），每个只划一次 -->
  <g font-family="sans-serif" font-weight="bold" text-anchor="middle" dominant-baseline="central">
    <!-- 行1: 1灰 2绿 3绿 4合(spf2) -->
    <rect x="112" y="112" width="180" height="180" rx="28" fill="#dfe5e0" stroke="#333" stroke-width="14" />
    <text x="202" y="202" font-size="86" fill="#9aa8a0">1</text>
    <rect x="312" y="112" width="180" height="180" rx="28" fill="#8bd3a0" stroke="#333" stroke-width="14" />
    <text x="402" y="202" font-size="86" fill="#1f5e3a">2</text>
    <rect x="512" y="112" width="180" height="180" rx="28" fill="#8bd3a0" stroke="#333" stroke-width="14" />
    <text x="602" y="202" font-size="86" fill="#1f5e3a">3</text>
    <rect x="712" y="112" width="180" height="180" rx="28" fill="#cdd8d0" stroke="#333" stroke-width="14" />
    <text x="800" y="196" font-size="86" fill="#8a978d">4</text>
    <text x="852" y="262" font-size="46" fill="#b5651d">2</text>
    <!-- 行2: 5绿 6合(spf2) 7绿 8合(spf2·当前红) -->
    <rect x="112" y="312" width="180" height="180" rx="28" fill="#8bd3a0" stroke="#333" stroke-width="14" />
    <text x="202" y="402" font-size="86" fill="#1f5e3a">5</text>
    <rect x="312" y="312" width="180" height="180" rx="28" fill="#cdd8d0" stroke="#333" stroke-width="14" />
    <text x="400" y="396" font-size="86" fill="#8a978d">6</text>
    <text x="452" y="462" font-size="46" fill="#b5651d">2</text>
    <rect x="512" y="312" width="180" height="180" rx="28" fill="#8bd3a0" stroke="#f0a000" stroke-width="26" />
    <text x="602" y="402" font-size="86" fill="#1f5e3a">7</text>
    <rect x="712" y="312" width="180" height="180" rx="28" fill="#e58a8a" stroke="#333" stroke-width="14" />
    <text x="800" y="396" font-size="86" fill="#7a1f1f">8</text>
    <text x="852" y="462" font-size="46" fill="#7a1f1f">2</text>
  </g>
</svg>
