<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 等值区间 [lb, ub)：三个重复值全绿，两界箭头夹住 -->
  <g stroke="#333" stroke-width="10">
    <rect x="60" y="600" width="100" height="140" rx="14" fill="#d7dedb" />
    <rect x="190" y="470" width="100" height="270" rx="14" fill="#8bd3a0" />
    <rect x="320" y="470" width="100" height="270" rx="14" fill="#8bd3a0" />
    <rect x="450" y="470" width="100" height="270" rx="14" fill="#8bd3a0" />
    <rect x="580" y="380" width="100" height="360" rx="14" fill="#d7dedb" />
    <rect x="710" y="280" width="100" height="460" rx="14" fill="#d7dedb" />
    <rect x="840" y="170" width="100" height="570" rx="14" fill="#d7dedb" />
  </g>
  <!-- 两界箭头 -->
  <g font-family="sans-serif" font-weight="bold" font-size="58" text-anchor="middle">
    <polygon points="240,790 180,880 300,880" fill="#e03131" />
    <text x="240" y="948" fill="#e03131">lb</text>
    <polygon points="630,790 570,880 690,880" fill="#f0a000" />
    <text x="630" y="948" fill="#f0a000">ub</text>
  </g>
  <text x="512" y="100" font-family="sans-serif" font-weight="bold" font-size="88" fill="#2e7d32" text-anchor="middle">count = ub − lb</text>
</svg>
