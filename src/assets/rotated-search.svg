<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 旋转数组断崖 + 放大镜 -->
  <g stroke="#333" stroke-width="10">
    <rect x="70" y="330" width="95" height="410" rx="14" fill="#a5d8ff" />
    <rect x="192" y="250" width="95" height="490" rx="14" fill="#a5d8ff" />
    <rect x="314" y="170" width="95" height="570" rx="14" fill="#a5d8ff" />
    <rect x="436" y="640" width="95" height="100" rx="14" fill="#8bd3a0" />
    <rect x="558" y="580" width="95" height="160" rx="14" fill="#8bd3a0" />
    <rect x="680" y="520" width="95" height="220" rx="14" fill="#8bd3a0" />
    <rect x="802" y="450" width="95" height="290" rx="14" fill="#8bd3a0" />
  </g>
  <!-- 断崖标记 -->
  <path d="M 420 150 L 420 620" stroke="#e03131" stroke-width="14" stroke-dasharray="30 20" />
  <text x="420" y="100" font-family="sans-serif" font-weight="bold" font-size="72" fill="#e03131" text-anchor="middle">断崖</text>
  <!-- 放大镜 -->
  <circle cx="620" cy="380" r="120" fill="none" stroke="#f0a000" stroke-width="26" />
  <line x1="710" y1="470" x2="830" y2="590" stroke="#f0a000" stroke-width="34" stroke-linecap="round" />
</svg>
