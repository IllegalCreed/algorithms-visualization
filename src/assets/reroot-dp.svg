<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 二次扫描：下行绿箭头 + 上行换根琥珀箭头 -->
  <g stroke="#9aa8a0" stroke-width="16">
    <line x1="512" y1="240" x2="310" y2="500" />
    <line x1="512" y1="240" x2="714" y2="500" />
    <line x1="310" y1="500" x2="190" y2="770" />
    <line x1="310" y1="500" x2="440" y2="770" />
  </g>
  <g stroke="#333" stroke-width="12">
    <circle cx="512" cy="240" r="92" fill="#f0a000" />
    <circle cx="310" cy="500" r="80" fill="#8bd3a0" />
    <circle cx="714" cy="500" r="80" fill="#d7dedb" />
    <circle cx="190" cy="770" r="80" fill="#d7dedb" />
    <circle cx="440" cy="770" r="80" fill="#d7dedb" />
  </g>
  <!-- 换根箭头 根→L -->
  <path d="M 430 300 C 340 340, 320 400, 330 430" fill="none" stroke="#e03131" stroke-width="26" stroke-linecap="round" />
  <polygon points="330,430 296,384 364,376" fill="#e03131" />
  <g font-family="sans-serif" font-weight="bold" font-size="66" text-anchor="middle" dominant-baseline="central">
    <text x="512" y="240" fill="#5e3a00">根</text>
    <text x="310" y="500" fill="#1f5e3a">新根</text>
  </g>
  <text x="512" y="960" font-family="sans-serif" font-weight="bold" font-size="70" fill="#333" text-anchor="middle">ans[v] = ans[u] − s + (n − s)</text>
</svg>
