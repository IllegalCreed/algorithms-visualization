<svg viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- 背包提手 -->
  <path
    d="M380 380 Q380 250 512 250 Q644 250 644 380"
    fill="none"
    stroke="#333333"
    stroke-width="40"
    stroke-linecap="round"
  />
  <!-- 背包主体 -->
  <rect x="240" y="360" width="544" height="500" rx="80" fill="none" stroke="#333333" stroke-width="44" />
  <!-- 顶部翻盖分隔线 -->
  <line x1="240" y1="500" x2="784" y2="500" stroke="#333333" stroke-width="38" />
  <!-- 内装三个相同物品（同一件可重复取） -->
  <g fill="#333333">
    <rect x="300" y="600" width="130" height="180" rx="22" />
    <rect x="447" y="600" width="130" height="180" rx="22" />
    <rect x="594" y="600" width="130" height="180" rx="22" />
  </g>
  <!-- 循环箭头（可重复取 ↻） -->
  <g fill="none" stroke="#333333" stroke-width="30" stroke-linecap="round">
    <path d="M735 175 A78 78 0 1 1 655 150" stroke-linejoin="round" />
    <polyline points="672 92 655 150 715 158" stroke-linejoin="round" />
  </g>
</svg>
